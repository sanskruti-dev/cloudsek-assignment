services:
  mongo:
    image: mongo:7.0
    container_name: metadata_mongo
    restart: unless-stopped
    # Bind to localhost only on the host; service-to-service traffic stays on the
    # internal Docker network. Avoids exposing MongoDB to the public internet.
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--bind_ip_all", "--quiet"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - metadata_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metadata_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_PREFIX: ${API_PREFIX:-/api/v1}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB: ${MONGO_DB:-metadata_inventory}
      MONGO_COLLECTION: ${MONGO_COLLECTION:-url_metadata}
      MONGO_STARTUP_RETRY_ATTEMPTS: ${MONGO_STARTUP_RETRY_ATTEMPTS:-30}
      MONGO_STARTUP_RETRY_DELAY_S: ${MONGO_STARTUP_RETRY_DELAY_S:-2.0}
      FETCH_TIMEOUT_S: ${FETCH_TIMEOUT_S:-15.0}
      FETCH_MAX_REDIRECTS: ${FETCH_MAX_REDIRECTS:-5}
      FETCH_MAX_BYTES: ${FETCH_MAX_BYTES:-5242880}
      FETCH_USER_AGENT: ${FETCH_USER_AGENT:-HTTPMetadataInventory/1.0 (+https://example.com/bot)}
      BLOCK_PRIVATE_NETWORKS: ${BLOCK_PRIVATE_NETWORKS:-false}
      ALLOWED_SCHEMES: ${ALLOWED_SCHEMES:-http,https}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health-check', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - metadata_net

networks:
  metadata_net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
